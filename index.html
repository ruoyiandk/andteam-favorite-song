<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>&TEAM 歌曲二選一大賽</title>
    <style>
        :root {
            --primary-pink: #ffb7c5;
            --primary-yellow: #ffe89e;
            --dark-gray: #333333;
            --bg-gradient: linear-gradient(135deg, #fff5f5 0%, #fffde6 100%);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--dark-gray);
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 700px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: center;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            letter-spacing: 2px;
            color: #444;
        }

        .round-title {
            font-size: 1.2rem;
            font-weight: bold;
            color: #777;
            margin-bottom: 5px;
        }

        .progress-container {
            width: 100%;
            height: 8px;
            background: #eee;
            border-radius: 4px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--primary-pink), var(--primary-yellow));
            transition: width 0.3s ease;
        }

        .game-zone {
            display: flex;
            gap: 20px;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
        }

        .vs-circle {
            background: #fff;
            border: 2px solid #ddd;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-style: italic;
            color: #aaa;
            flex-shrink: 0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .song-card {
            flex: 1;
            min-height: 180px;
            background: white;
            border: 3px solid transparent;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-size: 1.3rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 6px 15px rgba(0,0,0,0.03);
        }

        .song-card:first-child {
            background: linear-gradient(145deg, #ffffff, #fff0f2);
        }

        .song-card:last-child {
            background: linear-gradient(145deg, #ffffff, #fffdf0);
        }

        .song-card:first-child:hover {
            transform: translateY(-5px);
            border-color: var(--primary-pink);
            box-shadow: 0 12px 20px rgba(255, 183, 197, 0.4);
        }

        .song-card:last-child:hover {
            transform: translateY(-5px);
            border-color: var(--primary-yellow);
            box-shadow: 0 12px 20px rgba(255, 232, 158, 0.6);
        }

        .result-zone {
            display: none;
            animation: fadeIn 0.8s ease forwards;
        }

        .winner-crown {
            font-size: 4rem;
            margin-bottom: 10px;
            animation: bounce 1s infinite alternate;
        }

        .winner-name {
            font-size: 2.2rem;
            font-weight: bold;
            margin: 20px 0;
            background: linear-gradient(45deg, #ff6b8b, #ffca28);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .restart-btn {
            background: #444;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1rem;
            border-radius: 25px;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 20px;
        }

        .restart-btn:hover {
            background: #222;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-10px); }
        }

        @media (max-width: 600px) {
            .game-zone {
                flex-direction: column;
            }
            .vs-circle {
                margin: -5px 0;
            }
            .song-card {
                width: 100%;
                min-height: 120px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="game-ui">
        <h1>&TEAM 歌曲二選一</h1>
        <div class="round-title" id="round-text">載入中...</div>
        <div class="progress-container">
            <div class="progress-bar" id="progress"></div>
        </div>

        <div class="game-zone">
            <div class="song-card" id="choice-a" onclick="selectSong(0)"></div>
            <div class="vs-circle">VS</div>
            <div class="song-card" id="choice-b" onclick="selectSong(1)"></div>
        </div>
    </div>

    <div class="result-zone" id="result-ui">
        <div class="winner-crown">👑</div>
        <h2>你心中最愛的 &TEAM 歌曲是：</h2>
        <div class="winner-name" id="winner-text"></div>
        <button class="restart-btn" onclick="restartGame()">再玩一次</button>
    </div>
</div>

<script>
    // 完整重現圖片中的 32 首歌曲
    const originalSongs = [
        "Sakura-iro Yell", "Maybe", "Deer Hunter", "Run Wild",
        "illumination", "crescent moon's wish", "Biwitched", "Feel the Pulse",
        "Back to Life", "We on Fire", "Go in Blind", "Firework",
        "Yukiakari", "Aoarashi", "Mismatch", "Big suki",
        "Jyuugoya", "Alien", "Under the skin", "Samidare",
        "Heartbreak Time Machine", "HOTLINE", "W.O.L.F", "Wolf type",
        "The final Countdown", "BUZZ LOVE", "Melody", "MEME",
        "Rush", "Imprinted", "Dropkick", "Really Crazy"
    ];

    let currentSongs = [];
    let nextRoundSongs = [];
    let matchIndex = 0;
    let totalMatchesInRound = 0;
    let roundName = "";

    function startGame() {
        // 洗牌演算法（可自由選擇要不要隨機，這裡先預設洗牌讓每次玩都有新鮮感）
        currentSongs = [...originalSongs].sort(() => Math.random() - 0.5);
        nextRoundSongs = [];
        matchIndex = 0;
        
        document.getElementById('game-ui').style.display = 'block';
        document.getElementById('result-ui').style.display = 'none';
        
        updateRoundInfo();
        showMatch();
    }

    function updateRoundInfo() {
        const count = currentSongs.length;
        if (count === 32) roundName = "32 強賽";
        else if (count === 16) roundName = "16 強賽";
        else if (count === 8) roundName = "半準決賽 (8強)";
        else if (count === 4) roundName = "準決賽 (4強)";
        else if (count === 2) roundName = "✨ 總決賽 ✨";
        
        totalMatchesInRound = count / 2;
    }

    function showMatch() {
        if (currentSongs.length === 1) {
            endGame(currentSongs[0]);
            return;
        }

        // 顯示當前對決組別與進度
        document.getElementById('round-text').innerText = `${roundName} (${matchIndex + 1} / ${totalMatchesInRound})`;
        
        // 計算總進度 (這裏用簡單的對戰進度百分比)
        // 總共會進行 16+8+4+2+1 = 31 場比賽
        const totalPlayed = (32 - currentSongs.length) + (matchIndex * 2);
        const progressPercent = (totalPlayed / 31) * 100;
        document.getElementById('progress').style.width = `${progressPercent}%`;

        // 帶入歌曲名稱
        document.getElementById('choice-a').innerText = currentSongs[matchIndex * 2];
        document.getElementById('choice-b').innerText = currentSongs[matchIndex * 2 + 1];
    }

    function selectSong(selectedIndex) {
        // 選擇 A 或是 B
        const winner = currentSongs[matchIndex * 2 + selectedIndex];
        nextRoundSongs.push(winner);
        
        matchIndex++;

        // 檢查當前輪次是否全部比完
        if (matchIndex >= totalMatchesInRound) {
            currentSongs = nextRoundSongs;
            nextRoundSongs = [];
            matchIndex = 0;
            updateRoundInfo();
        }

        // 播放下一場
        showMatch();
    }

    function endGame(finalWinner) {
        document.getElementById('game-ui').style.display = 'none';
        document.getElementById('result-ui').style.display = 'block';
        document.getElementById('winner-text').innerText = finalWinner;
    }

    function restartGame() {
        startGame();
    }

    // 網頁載入後自動啟動
    window.onload = startGame;
</script>

</body>
</html>
