<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>&TEAM 歌曲二選一對決</title>
    <style>
        :root {
            --bg-color: #0b0c10;
            --card-bg: #1f2833;
            --text-color: #c5a059; /* 帶點質感的金色/黃色系 */
            --text-light: #ffffff;
            --accent-color: #45f3ff; /* 霓虹藍 */
            --accent-purple: #8a2be2;
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-light);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding: 20px;
            width: 100%;
            background: linear-gradient(180deg, rgba(27,38,59,1) 0%, rgba(11,12,16,1) 100%);
        }

        h1 {
            margin: 0;
            font-size: 2.5rem;
            letter-spacing: 2px;
            color: var(--text-light);
            text-shadow: 0 0 10px var(--accent-color);
        }

        .subtitle {
            color: #85929E;
            margin-top: 5px;
            font-size: 1rem;
        }

        .progress {
            margin: 15px 0;
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--accent-color);
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            width: 90%;
            max-width: 1000px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .song-card {
            background-color: var(--card-bg);
            border: 2px solid #2c3b4e;
            border-radius: 15px;
            width: 40%;
            min-width: 280px;
            height: 250px;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            cursor: pointer;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
